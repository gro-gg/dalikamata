name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test ./... -race

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            echo "Run 'go fmt ./...' and commit the result."
            exit 1
          fi

  build-images:
    needs: [test, vet, lint, fmt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build images
        run: |
          docker build -f deploy/docker/Dockerfile         -t dalikamata:latest         .
          docker build -f deploy/docker/Dockerfile.fakes   -t dalifakes:latest          .
          docker build -f deploy/docker/Dockerfile.grafana -t dalikamata-grafana:latest .
      - name: Save images
        run: |
          docker save dalikamata:latest         -o dalikamata.tar
          docker save dalifakes:latest          -o dalifakes.tar
          docker save dalikamata-grafana:latest -o dalikamata-grafana.tar
      - uses: actions/upload-artifact@v7
        with:
          name: docker-images
          path: |
            dalikamata.tar
            dalifakes.tar
            dalikamata-grafana.tar

  e2e-test:
    needs: [build-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v8
        with:
          name: docker-images
      - name: Load images
        run: |
          docker load -i dalikamata.tar
          docker load -i dalifakes.tar
      - run: go test -tags=e2e ./internal/e2e/... -v -timeout 2m -skip-docker-build

  publish:
    needs: [e2e-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docker-images
      - name: Load images
        run: |
          docker load -i dalikamata.tar
          docker load -i dalikamata-grafana.tar
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag and push
        run: |
          docker tag dalikamata:latest ghcr.io/${{ github.repository }}:${{ github.run_number }}
          docker tag dalikamata:latest ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.run_number }}
          docker push ghcr.io/${{ github.repository }}:latest
          docker tag dalikamata-grafana:latest ghcr.io/${{ github.repository_owner }}/dalikamata-grafana:${{ github.run_number }}
          docker tag dalikamata-grafana:latest ghcr.io/${{ github.repository_owner }}/dalikamata-grafana:latest
          docker push ghcr.io/${{ github.repository_owner }}/dalikamata-grafana:${{ github.run_number }}
          docker push ghcr.io/${{ github.repository_owner }}/dalikamata-grafana:latest

  publish-helm:
    needs: [e2e-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Package and push Helm chart
        run: |
          VERSION="0.0.${{ github.run_number }}"
          sed -i "s/^version:.*/version: ${VERSION}/" deploy/helm/dalikamata/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ github.run_number }}\"/" deploy/helm/dalikamata/Chart.yaml
          sed -i "s/^  tag:.*/  tag: \"${{ github.run_number }}\"/" deploy/helm/dalikamata/values.yaml
          helm package deploy/helm/dalikamata
          helm push dalikamata-${VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}/helm

  tag-release:
    needs: [publish, publish-helm]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Create and push release tag
        run: |
          git tag v${{ github.run_number }}
          git push origin v${{ github.run_number }}
