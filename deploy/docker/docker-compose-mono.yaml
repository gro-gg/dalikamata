services:
  dalikamata-fake-bitbucket:
    image: dalifakes:latest
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.fakes
    command:
      - "bitbucket"
      - "--addr=0.0.0.0:17990"
    ports:
      - "17990:17990"

  dalikamata-fake-jenkins:
    image: dalifakes:latest
    command:
      - "jenkins"
      - "--addr=0.0.0.0:17991"
    ports:
      - "17991:17991"

  dalikamata:
    image: dalikamata:latest
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    command:
      - "--nats-port=14222"
      - "--metrics-addr=0.0.0.0:12112"
      - "--metric-refresh-interval=1s"
      - "--api-addr=0.0.0.0:12113"
      - "mono"
      - "--nats-data=/tmp/nats"
      - "--bitbucket-url=http://dalikamata-fake-bitbucket:17990"
      - "--bitbucket-token=test-token"
      - "--bitbucket-projects=PROJ,INFRA"
      - "--component-config-enabled"
      - "--component-config-file=.dalikamata.yaml"
      - "--jenkins-url=http://dalikamata-fake-jenkins:17991"
      - "--jenkins-user=any"
      - "--jenkins-token=any"
      - "--dir=/components"
    depends_on:
      - dalikamata-fake-bitbucket
    ports:
      - "14222:14222"
      - "12112:12112"
      - "12113:12113"
    volumes:
      - ./components:/components:ro

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus-mono.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: dalikamata-grafana:latest
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.grafana
    container_name: grafana
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - DALIKAMATA_API_URL=http://dalikamata:12113
    volumes:
      - ./grafana_provisioning:/etc/grafana/provisioning
      - grafana_storage:/var/lib/grafana

volumes:
 grafana_storage:
