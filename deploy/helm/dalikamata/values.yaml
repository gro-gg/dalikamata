image:
  repository: ghcr.io/gro-gg/dalikamata
  tag: "PIPELINE_WILL_REPLACE_ME_WITH_VERSION"
  pullPolicy: IfNotPresent

nats:
  enabled: true
  port: 4222

domain:
  enabled: true
  debug: false
  persistence: {}
  # persistence:
  #   size: 1Gi
  #   storageClass: ""

metrics:
  enabled: true
  debug: false
  port: 2112

api:
  enabled: true
  port: 2113

ingest:
  bitbucket:
    # Set url to enable the Bitbucket ingestor.
    url: ""
    debug: false
    # Required when url is set: comma-separated Bitbucket project keys to crawl (e.g. "PROJ,INFRA")
    projects: ""
    # Optional: name of a pre-existing Secret with key "token".
    # If empty, the chart auto-creates a Secret named <release>-bitbucket with a random token.
    existingSecret: ""
    # Optional: directory inside the container where CA certificates are stored.
    # Pass the mount path of your extraVolumeMounts cert bundle here (e.g. "/etc/ssl/certs/custom").
    caCertsDir: ""
    # Extra volumes to attach to the Bitbucket ingest pod (e.g. CA certificate ConfigMaps).
    extraVolumes: []
    # - name: ca-certs
    #   configMap:
    #     name: my-ca-bundle
    # Extra volume mounts for the Bitbucket ingest container.
    extraVolumeMounts: []
    # - name: ca-certs
    #   mountPath: /etc/ssl/certs/my-ca.crt
    #   subPath: ca.crt
    #   readOnly: true

  jenkins:
    # Set url to enable the Jenkins ingestor.
    url: ""
    debug: false
    # Required when url is set: Jenkins username for API access
    user: ""
    # Optional: full Jenkins job paths to crawl (e.g. ["folder/job-a", "folder/job-b"]).
    # Crawls all jobs when empty.
    jobs: []
    # Optional: name of a pre-existing Secret with key "token".
    # If empty, the chart auto-creates a Secret named <release>-jenkins with a random token.
    existingSecret: ""
    # Optional: directory inside the container where CA certificates are stored.
    # Pass the mount path of your extraVolumeMounts cert bundle here (e.g. "/etc/ssl/certs/custom").
    caCertsDir: ""
    # Extra volumes to attach to the Jenkins ingest pod (e.g. CA certificate ConfigMaps).
    extraVolumes: []
    # - name: ca-certs
    #   configMap:
    #     name: my-ca-bundle
    # Extra volume mounts for the Jenkins ingest container.
    extraVolumeMounts: []
    # - name: ca-certs
    #   mountPath: /etc/ssl/certs/my-ca.crt
    #   subPath: ca.crt
    #   readOnly: true

  config:
    # Component YAML files (*.yaml / *.yml) drive the config ingest crawler.
    # The chart auto-creates the ingest-config Deployment and a ConfigMap as
    # soon as either source below is present:
    #
    # 1. Files dropped into deploy/helm/dalikamata/files/components/ in this
    #    chart — the chart packages them into a ConfigMap automatically.
    # 2. An externally managed ConfigMap referenced by existingConfigMap below.
    #
    # If both are set, existingConfigMap wins and the chart-managed ConfigMap
    # is not created. If neither is set, the Deployment is not created.
    existingConfigMap: ""
    debug: false

prometheus:
  enabled: false
  scrapeInterval: 15s
  service:
    type: ClusterIP
  persistence:
    size: 8Gi
    storageClass: ""
  ingress:
    enabled: false
    # IngressClass to use (e.g. "nginx", "traefik"). Leave empty to use the cluster default.
    className: ""
    # Required when ingress.enabled is true — hostname Prometheus will be served on.
    hostname: ""
    # Arbitrary annotations forwarded to the Ingress object.
    # Useful for cert-manager, rewrite rules, auth middleware, etc.
    # annotations:
    #   cert-manager.io/cluster-issuer: letsencrypt-prod
    #   nginx.ingress.kubernetes.io/ssl-redirect: "true"
    annotations: {}
    # TLS configuration. Each entry names a Secret and the hosts it covers.
    # tls:
    #   - hosts:
    #       - prometheus.example.com
    #     secretName: prometheus-tls
    tls: []

grafana:
  enabled: false
  # Set to false to skip provisioning the built-in dashboards (e.g. when managing your own).
  dashboards:
    enabled: true
  image:
    # Custom image with the Infinity datasource plugin pre-installed.
    # Published to GHCR by CI alongside the main image (same versioning).
    repository: ghcr.io/gro-gg/dalikamata-grafana
    # Leave empty to inherit .Values.image.tag — keeps the Grafana image in
    # lockstep with the main image. Set explicitly to pin a different tag or
    # when overriding repository to bring your own Grafana image.
    tag: ""
    pullPolicy: IfNotPresent
  # Optional: name of a pre-existing Secret with key "admin-password".
  # If empty, the chart auto-creates a Secret named <release>-grafana with a random password.
  existingSecret: ""
  # Extra environment variables injected into the Grafana container.
  # Use GF_* variables to override any grafana.ini setting.
  extraEnv: []
  service:
    type: ClusterIP
  persistence:
    size: 2Gi
    storageClass: ""
  ingress:
    enabled: false
    # IngressClass to use (e.g. "nginx", "traefik"). Leave empty to use the cluster default.
    className: ""
    # Required when ingress.enabled is true — hostname Grafana will be served on.
    hostname: ""
    # Arbitrary annotations forwarded to the Ingress object.
    # Useful for cert-manager, rewrite rules, auth middleware, etc.
    # annotations:
    #   cert-manager.io/cluster-issuer: letsencrypt-prod
    #   nginx.ingress.kubernetes.io/ssl-redirect: "true"
    annotations: {}
    # TLS configuration. Each entry names a Secret and the hosts it covers.
    # tls:
    #   - hosts:
    #       - grafana.example.com
    #     secretName: grafana-tls
    tls: []
