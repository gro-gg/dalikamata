{{- if .Values.nats.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dalikamata.natsServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dalikamata.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  type: ClusterIP
  selector:
    {{- include "dalikamata.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nats
  ports:
    - name: nats
      port: {{ .Values.nats.port }}
      targetPort: nats
      protocol: TCP
{{- end }}
