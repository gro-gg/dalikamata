{{- if .Values.ingest.jenkins.url }}
{{- if not .Values.ingest.jenkins.existingSecret }}
{{- $secretName := printf "%s-jenkins" (include "dalikamata.fullname" .) }}
{{- $secretObj := (lookup "v1" "Secret" .Release.Namespace $secretName) | default dict }}
{{- $secretData := (get $secretObj "data") | default dict }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dalikamata.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest-jenkins
type: Opaque
data:
  # Preserved from existing Secret on upgrade; generated once on first install.
  token: {{ (get $secretData "token") | default (randAlphaNum 32 | b64enc) }}
{{- end }}
{{- end }}
