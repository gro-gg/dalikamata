apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dalikamata.fullname" . }}-ingest-jenkins
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dalikamata.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest-jenkins
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "dalikamata.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ingest-jenkins
  template:
    metadata:
      labels:
        {{- include "dalikamata.labels" . | nindent 8 }}
        app.kubernetes.io/component: ingest-jenkins
    spec:
      containers:
        - name: ingest-jenkins
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--nats-host={{ include "dalikamata.natsServiceName" . }}"
            - "--nats-port={{ .Values.nats.port }}"
            - "ingest"
            - "jenkins"
            - "--jenkins-url={{ .Values.ingest.jenkins.url }}"
            - "--jenkins-user={{ required "ingest.jenkins.user is required" .Values.ingest.jenkins.user }}"
            - "--jenkins-token=$(JENKINS_TOKEN)"
            {{- if .Values.ingest.jenkins.jobs }}
            - "--jenkins-jobs={{ join "," .Values.ingest.jenkins.jobs }}"
            {{- end }}
            {{- if .Values.ingest.jenkins.caCertsDir }}
            - "--ca-certs-dir={{ .Values.ingest.jenkins.caCertsDir }}"
            {{- end }}
            {{- if .Values.ingest.jenkins.debug }}
            - "--debug"
            {{- end }}
          env:
            - name: JENKINS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "dalikamata.jenkinsSecretName" . }}
                  key: token
          {{- with .Values.ingest.jenkins.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.ingest.jenkins.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
