{{- if and .Values.grafana.enabled (not .Values.grafana.existingSecret) }}
{{- $secretName := printf "%s-grafana" (include "dalikamata.fullname" .) }}
{{- $secretObj := (lookup "v1" "Secret" .Release.Namespace $secretName) | default dict }}
{{- $secretData := (get $secretObj "data") | default dict }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dalikamata.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
type: Opaque
data:
  # Preserved from existing Secret on upgrade; generated once on first install.
  admin-password: {{ (get $secretData "admin-password") | default (randAlphaNum 24 | b64enc) }}
{{- end }}
