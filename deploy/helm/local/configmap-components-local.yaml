# Standalone ConfigMap for local testing of the config ingest service.
#
# Apply with:
#   kubectl apply -f deploy/helm/configmap-components-local.yaml
#
# Then reference it in your Helm values:
#   ingest:
#     config:
#       existingConfigMap: dalikamata-components-local
#
# Each key in data is treated as a separate component YAML file mounted
# under /components inside the ingest-config container.
#
# IMPORTANT — repo ID format:
#   The repos[].id values must exactly match the RepoID that the Bitbucket
#   crawler publishes (e.g. "PROJ/frontend-app"). Workflows are discovered
#   automatically from their owning repo — no explicit workflow list is needed.
#
#   To discover the actual repo IDs in a running deployment:
#     curl http://localhost:2113/api/v1/repos | jq '.hits[].repo_id'
apiVersion: v1
kind: ConfigMap
metadata:
  name: dalikamata-components-local
data:
  frontend.yaml: |
    version: "1"
    name: frontend
    team: platform
    repos:
      - id: PROJ/frontend-app

  backend.yaml: |
    version: "1"
    name: backend
    team: platform
    repos:
      - id: PROJ/backend-api
