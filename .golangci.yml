version: "2"

linters:
  enable:
    - errcheck       # unchecked errors
    - govet          # suspicious constructs
    - staticcheck    # broad static analysis (includes SA, S, ST families)
    - ineffassign    # assignments whose values are never used
    - unused         # unused code
    - gosec          # security: TLS config, file paths, HTTP, hardcoded creds
    - bodyclose      # unclosed HTTP response bodies
    - sqlclosecheck  # unclosed sql.Rows (SQLite backend)
#    - gosimple       # simplification suggestions
#    - gocritic       # opinionated but useful style checks
#    - noctx          # http calls without context
#    - exhaustive     # exhaustive enum switches
#    - revive         # drop-in golint replacement
